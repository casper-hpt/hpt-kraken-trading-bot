apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpt-llm
  labels:
    app: hpt-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hpt-llm
  template:
    metadata:
      labels:
        app: hpt-llm
    spec:
      imagePullSecrets:
        - name: gcr-secret
      containers:
        - name: hpt-llm
          image: northamerica-northeast2-docker.pkg.dev/home-2apollo/home-2apollo-quant/hpt-llm:latest
          ports:
            - name: metrics
              containerPort: 9096
          envFrom:
            - secretRef:
                name: hpt-llm-secrets
          env:
            - name: OLLAMA_URL
              value: "http://192.168.2.38:11434/api/chat"
            - name: OLLAMA_MODEL
              value: "qwen2.5:14b-instruct"
            - name: KAFKA_PRODUCER_BOOTSTRAP_SERVERS
              value: "broker:29092"
            - name: KAFKA_OUTPUT_TOPIC
              value: "news-signals"
            - name: THEORY_CRON_HOUR
              value: "2"
            - name: THEORY_CRON_MINUTE
              value: "0"
            - name: THEORY_SCAN_TIMESPAN
              value: "24h"
            - name: DB_HOST
              value: "questdb"
            - name: DB_PORT
              value: "8812"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "quest"
            - name: DB_NAME
              value: "qdb"
            - name: PROMETHEUS_PORT
              value: "9096"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hpt-llm
  labels:
    app: hpt-llm
spec:
  selector:
    app: hpt-llm
  ports:
    - name: metrics
      port: 9096
      targetPort: 9096
      protocol: TCP
