apiVersion: v1
kind: ConfigMap
metadata:
  name: crypto-data-collector-config
data:
  QUESTDB_HOST: "questdb"
  QUESTDB_HTTP_PORT: "9000"
  INGEST_INTERVAL_MINUTES: "1"
  PROMETHEUS_PORT: "9092"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-data-collector
  labels:
    app: crypto-data-collector
    portfolio: crypto
    component: data-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-data-collector
  template:
    metadata:
      labels:
        app: crypto-data-collector
        portfolio: crypto
        component: data-collector
    spec:
      containers:
        - name: crypto-data-collector
          image: northamerica-northeast2-docker.pkg.dev/home-2apollo/home-2apollo-quant/crypto-data-collector:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9092
              protocol: TCP
          envFrom:
            - configMapRef:
                name: crypto-data-collector-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsUser: 10001
            runAsNonRoot: true
      imagePullSecrets:
        - name: gcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: crypto-data-collector
  labels:
    app: crypto-data-collector
spec:
  selector:
    app: crypto-data-collector
  ports:
    - name: metrics
      port: 9092
      targetPort: 9092
      protocol: TCP