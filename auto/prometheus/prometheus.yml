global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: crypto-data-collector
    static_configs:
      - targets: ["crypto-data-collector:9092"]

  - job_name: crypto-trader
    static_configs:
      - targets: ["crypto-trader:9095"]

  - job_name: signal-service
    static_configs:
      - targets: ["signal-service:9093"]
