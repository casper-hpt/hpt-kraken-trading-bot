global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: crypto-data-collector
    static_configs:
      - targets: ["data-collector:9092"]

  - job_name: crypto-trader
    static_configs:
      - targets: ["trader:9095"]

  - job_name: llm-signal
    static_configs:
      - targets: ["llm-signal:9093"]
